services:
  s3backup:
    build: .
    image: s3-backup-studio:latest
    container_name: s3-backup-studio
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PORT:             ${PORT:-3000}
      NODE_ENV:         ${NODE_ENV}
      AUTH_USER:        ${AUTH_USER}
      AUTH_PASSWORD:    ${AUTH_PASSWORD}
      ALLOWED_ORIGIN:   ${ALLOWED_ORIGIN:-}
    volumes:
      # Persist jobs, history, and checkpoints across container restarts
      - s3backup-data:/app/data
      # Persist log files
      - s3backup-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  s3backup-data:
  s3backup-logs:
